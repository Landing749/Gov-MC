<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOV-MC — Verify Certificate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7a0000;
  --cream:#f8f4e6;--border:#e0d4c4;--bg:#eee9df;
  --text:#1a1208;--muted:#7a6f5e;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ─── NAV ─── */
.nav{
  background:var(--accent);color:#fff;height:56px;
  display:flex;align-items:center;padding:0 28px;gap:16px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.nav-logo{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;letter-spacing:6px}
.nav-sep{width:1px;height:28px;background:rgba(255,255,255,.2)}
.nav-sub{font-size:10px;letter-spacing:3px;opacity:.6;text-transform:uppercase;font-weight:500}
.nav-sp{flex:1}
.nav-pill{font-size:9px;font-weight:600;background:rgba(255,255,255,.12);padding:5px 13px;border-radius:20px;letter-spacing:2px;border:1px solid rgba(255,255,255,.18);text-transform:uppercase;}
.nav-link{font-size:10px;color:rgba(255,255,255,.7);text-decoration:none;letter-spacing:.8px;padding:5px 13px;border-radius:6px;transition:all .15s;font-weight:500;}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}

/* ─── PAGE ─── */
.page{max-width:1100px;margin:0 auto;padding:40px 24px 60px}

/* ─── SEARCH BAR ─── */
.search-wrap{
  background:#fff;border-radius:14px;
  border:1.5px solid var(--border);
  padding:24px 28px;margin-bottom:32px;
  box-shadow:0 2px 16px rgba(0,0,0,.06);
}
.search-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.search-title::after{content:'';flex:1;height:1px;background:var(--border)}
.search-row{display:flex;gap:10px}
.search-input{
  flex:1;padding:11px 16px;font-size:14px;font-family:'DM Sans',sans-serif;
  border:1.5px solid var(--border);border-radius:8px;outline:none;
  background:#fafaf8;transition:all .15s;
}
.search-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(122,0,0,.07);}
.search-btn{
  padding:11px 22px;background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;
  font-weight:600;cursor:pointer;letter-spacing:.4px;transition:all .15s;
}
.search-btn:hover{background:#5a0000;transform:translateY(-1px);box-shadow:0 4px 14px rgba(122,0,0,.3)}

/* ─── STATUS STATES ─── */
.state{text-align:center;padding:60px 20px;color:#bbb;font-size:14px;letter-spacing:.5px}
.state-icon{font-size:48px;margin-bottom:16px;display:block}

/* ─── RESULT HEADER ─── */
.result-header{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
  padding:16px 20px;background:#fff;border-radius:10px;
  border:1.5px solid var(--border);
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.status-badge{
  padding:6px 16px;border-radius:20px;font-size:10px;font-weight:800;
  letter-spacing:2.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;
}
.status-active{background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7}
.status-revoked{background:#ffebee;color:#b71c1c;border:1.5px solid #ef9a9a}
.status-unknown{background:#f3e5f5;color:#6a1b9a;border:1.5px solid #ce93d8}
.result-id{font-family:'DM Mono',monospace;font-size:14px;color:var(--muted);font-weight:500}
.result-corp{font-size:18px;font-family:'Playfair Display',serif;color:var(--text);font-weight:700;flex:1}
.verify-stamp{
  display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;
  letter-spacing:2px;color:#2e7d32;text-transform:uppercase;
  background:#e8f5e9;padding:7px 14px;border-radius:8px;border:1px solid #a5d6a7;
}
.verify-stamp.fail{color:#b71c1c;background:#ffebee;border-color:#ef9a9a}

/* ─── CERT DISPLAY ─── */
.cert-section-label{
  font-size:9px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.cert-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.cert-wrap{
  background:#fff;border-radius:10px;
  box-shadow:0 8px 48px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.05);
  overflow:hidden;margin-bottom:28px;
}
.cert-wrap svg{width:100%;height:auto;display:block}

/* ─── DATA TABLE ─── */
.data-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;margin-bottom:32px;
}
.data-card{
  background:#fff;border:1.5px solid var(--border);border-radius:10px;
  padding:14px 16px;
}
.data-card-label{font-size:9.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.data-card-value{font-size:14px;font-family:'DM Mono',monospace;color:var(--text);font-weight:500;word-break:break-all}
.data-card-value.big{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}

/* ─── ERROR CARD ─── */
.err-card{
  background:#fff;border:1.5px solid #ef9a9a;border-radius:12px;
  padding:32px;text-align:center;max-width:500px;margin:40px auto;
  box-shadow:0 4px 24px rgba(0,0,0,.06);
}
.err-icon{font-size:40px;margin-bottom:12px}
.err-title{font-size:18px;font-family:'Playfair Display',serif;color:#b71c1c;margin-bottom:8px}
.err-msg{font-size:13px;color:#999;line-height:1.7}

/* Loading spinner */
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(122,0,0,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Download row */
.dl-row{display:flex;gap:10px;justify-content:center;margin-bottom:32px}
.dl-btn{
  padding:10px 22px;background:transparent;color:var(--accent);
  border:1.5px solid var(--accent);border-radius:8px;
  font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;
  cursor:pointer;letter-spacing:.4px;transition:all .15s;
}
.dl-btn:hover{background:#fff5f5;transform:translateY(-1px)}

/* Search tags */
.search-tag{
  font-size:10px;font-weight:600;letter-spacing:.8px;
  padding:4px 12px;border-radius:20px;cursor:pointer;
  background:rgba(122,0,0,.07);color:var(--accent);
  border:1px solid rgba(122,0,0,.15);transition:all .15s;
  user-select:none;
}
.search-tag:hover{background:rgba(122,0,0,.14);}

/* Multi-result list */
.multi-result-header{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 14px;display:flex;align-items:center;gap:10px;}
.multi-result-header::after{content:'';flex:1;height:1px;background:var(--border)}
.result-list-item{
  background:#fff;border:1.5px solid var(--border);border-radius:10px;
  padding:14px 18px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all .15s;box-shadow:0 1px 6px rgba(0,0,0,.04);
}
.result-list-item:hover{border-color:var(--accent);box-shadow:0 3px 16px rgba(122,0,0,.1);transform:translateY(-1px);}
.rli-corp{font-size:15px;font-family:'Playfair Display',serif;font-weight:700;flex:1;}
.rli-id{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
.rli-type{font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 9px;border-radius:12px;text-transform:uppercase;}
.rli-type.ipo{background:rgba(122,0,0,.08);color:var(--accent);}
.rli-type.reg{background:rgba(26,107,40,.08);color:#1a6b28;}
.rli-arrow{color:#ccc;font-size:16px;}
.no-results{text-align:center;padding:40px 20px;color:#bbb;font-size:13px;}
.footer{
  text-align:center;font-size:10.5px;color:#bbb;letter-spacing:.8px;
  padding-top:24px;border-top:1px solid var(--border);
  font-family:'DM Mono',monospace;
}

#qr-gen{position:fixed;left:-9999px;top:-9999px;width:300px;height:300px}
</style>
</head>
<body>
<div id="qr-gen"></div>

<nav class="nav" id="main-nav">
  <span class="nav-logo">GOV-MC</span>
  <div class="nav-sep"></div>
  <span class="nav-sub">Certificate Verification</span>
  <div class="nav-sp"></div>
  <a class="nav-link" href="govmc-issue.html">⊕ Issue Certificate</a>
  <span class="nav-pill">Verify Portal</span>
</nav>

<div class="page">

  <!-- Search Bar -->
  <div class="search-wrap">
    <div class="search-title"><span>🔍</span> Certificate Lookup</div>
    <div class="search-row">
      <input class="search-input" id="search-input" type="text" placeholder="Certificate ID (GMC-IPO-0001) or Corporation Name…" onkeydown="if(event.key==='Enter')doSearch()" oninput="updateSearchHint()">
      <button class="search-btn" onclick="doSearch()">Verify</button>
    </div>
    <div id="search-hint-row" style="display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;">
      <div class="search-tag" id="hint-id" onclick="document.getElementById('search-input').placeholder='Certificate ID — e.g. GMC-IPO-0001'">🪪 Search by Certificate ID</div>
      <div class="search-tag" id="hint-corp" onclick="document.getElementById('search-input').placeholder='Corporation Name — e.g. Redstone Industries'">🏢 Search by Corporation Name</div>
      <div class="search-tag" id="hint-reg" onclick="document.getElementById('search-input').placeholder='Registration ID — e.g. GMC-REG-0001'">📋 Search by Registration ID</div>
    </div>
    <div id="search-mode-badge" style="display:none;margin-top:8px;font-size:10px;color:var(--muted);letter-spacing:.5px;"></div>
  </div>

  <!-- Result area -->
  <div id="result-area">
    <div class="state">
      <span class="state-icon">🏛️</span>
      Enter a Certificate ID above to verify its authenticity and view the official document.
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
// ── FIREBASE ──────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyCxylDmL0gBJsPGeKG8rLbvDWphbaDAIvk",
  authDomain:"minecraft-server-ce7fb.firebaseapp.com",
  databaseURL:"https://minecraft-server-ce7fb-default-rtdb.firebaseio.com",
  projectId:"minecraft-server-ce7fb",
  storageBucket:"minecraft-server-ce7fb.firebasestorage.app",
  messagingSenderId:"887361447311",
  appId:"1:887361447311:web:7e6d46c1897f651b5a97fa"
});
const db = firebase.database();

// ── THEMES ────────────────────────────────────────────────
var THEMES = {
  red:   '#7a0000',
  green: '#1a6b28',
  gold:  '#8a6800',
};
function themeColor(t){ return THEMES[t] || THEMES['red']; }

// ── QR GEN ────────────────────────────────────────────────
function genQR(url) {
  return new Promise(function(resolve) {
    var div=document.getElementById('qr-gen'); div.innerHTML='';
    new QRCode(div,{text:url,width:300,height:300,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      var canvas=div.querySelector('canvas');
      if(canvas)return resolve(canvas.toDataURL('image/png'));
      var img2=div.querySelector('img');resolve(img2?img2.src:null);
    });});
  });
}

// ── URL PARAM ─────────────────────────────────────────────
function getParam(name) {
  var u=new URLSearchParams(window.location.search); return u.get(name)||'';
}

// ── SEARCH HINT ───────────────────────────────────────────
function updateSearchHint() {
  var val = document.getElementById('search-input').value.trim();
  var badge = document.getElementById('search-mode-badge');
  if (!val) { badge.style.display='none'; return; }
  badge.style.display = 'block';
  if (/^GMC-IPO/i.test(val)) badge.textContent = '🪪 Searching IPO certificates by ID…';
  else if (/^GMC-REG/i.test(val)) badge.textContent = '📋 Searching registration records by ID…';
  else badge.textContent = '🏢 Searching all records by corporation name…';
}

// ── SEARCH ────────────────────────────────────────────────
function doSearch() {
  var raw = document.getElementById('search-input').value.trim();
  if (!raw) { alert('Please enter a Certificate ID or Corporation Name.'); return; }

  // Detect search type
  if (/^GMC-IPO/i.test(raw)) {
    window.history.replaceState({},'','?id='+encodeURIComponent(raw));
    loadCert(raw, 'certificates');
  } else if (/^GMC-REG/i.test(raw)) {
    window.history.replaceState({},'','?regid='+encodeURIComponent(raw));
    loadCert(raw, 'registrations');
  } else {
    // Corp name search — check both tables
    window.history.replaceState({},'','?corp='+encodeURIComponent(raw));
    searchByCorpName(raw);
  }
}

async function loadCert(id, table) {
  var area = document.getElementById('result-area');
  table = table || 'certificates';
  area.innerHTML = '<div class="state"><div class="spinner"></div><br>Looking up <strong>'+escHtml(id)+'</strong>…</div>';
  try {
    var snap = await db.ref(table+'/'+id).once('value');
    if (!snap.exists()) {
      // Try the other table as fallback
      var other = table === 'certificates' ? 'registrations' : 'certificates';
      var snap2 = await db.ref(other+'/'+id).once('value');
      if (snap2.exists()) {
        var d2 = snap2.val(); d2._table = other;
        var ac2 = themeColor(d2.theme||'red');
        document.getElementById('main-nav').style.background = ac2;
        var qr2 = await genQR(window.location.href.replace(/\?.*/,'')+'?'+(other==='certificates'?'id':'regid')+'='+encodeURIComponent(id));
        renderResult(d2, qr2, ac2, other);
        return;
      }
      area.innerHTML = '<div class="err-card"><div class="err-icon">⚠️</div><div class="err-title">Record Not Found</div><div class="err-msg">No record matching <strong>'+escHtml(id)+'</strong> exists in the GOV-MC database. The ID may be invalid or incorrectly entered.</div></div>';
      return;
    }
    var d = snap.val(); d._table = table;
    var accentColor = themeColor(d.theme||'red');
    document.getElementById('main-nav').style.background = accentColor;
    var verifyURL = window.location.href.replace(/\?.*/,'')+'?'+(table==='certificates'?'id':'regid')+'='+encodeURIComponent(d.certid||d.regid||id);
    var qrUrl = await genQR(verifyURL);
    renderResult(d, qrUrl, accentColor, table);
  } catch(e) {
    area.innerHTML = '<div class="err-card"><div class="err-icon">🔴</div><div class="err-title">Database Error</div><div class="err-msg">'+escHtml(e.message)+'</div></div>';
  }
}

async function searchByCorpName(query) {
  var area = document.getElementById('result-area');
  area.innerHTML = '<div class="state"><div class="spinner"></div><br>Searching all records for <strong>'+escHtml(query)+'</strong>…</div>';
  try {
    var q = query.toLowerCase();
    var results = [];

    // Search IPO certificates
    var snap1 = await db.ref('certificates').once('value');
    if (snap1.exists()) {
      snap1.forEach(function(child) {
        var d = child.val();
        if (d.corp && d.corp.toLowerCase().includes(q)) {
          results.push({ d: d, table: 'certificates', id: child.key });
        }
      });
    }

    // Search registrations
    var snap2 = await db.ref('registrations').once('value');
    if (snap2.exists()) {
      snap2.forEach(function(child) {
        var d = child.val();
        if (d.corp && d.corp.toLowerCase().includes(q)) {
          results.push({ d: d, table: 'registrations', id: child.key });
        }
      });
    }

    if (results.length === 0) {
      area.innerHTML = '<div class="err-card"><div class="err-icon">🔎</div><div class="err-title">No Results Found</div><div class="err-msg">No corporation matching <strong>"'+escHtml(query)+'"</strong> was found in the GOV-MC database. Try a different name or search by Certificate ID.</div></div>';
      return;
    }

    if (results.length === 1) {
      // Single match — go straight to result
      var r = results[0]; r.d._table = r.table;
      var ac = themeColor(r.d.theme||'red');
      document.getElementById('main-nav').style.background = ac;
      var qrUrl = await genQR(window.location.href.replace(/\?.*/,'')+'?'+(r.table==='certificates'?'id':'regid')+'='+encodeURIComponent(r.id));
      renderResult(r.d, qrUrl, ac, r.table);
      return;
    }

    // Multiple matches — show list
    var html = '<div class="multi-result-header"><span>🏢</span> '+results.length+' record'+(results.length>1?'s':'')+' found for "'+escHtml(query)+'"</div>';
    results.forEach(function(r) {
      var typeLabel = r.table === 'certificates' ? 'IPO' : 'REG';
      var typeCls   = r.table === 'certificates' ? 'ipo' : 'reg';
      var displayId = r.d.certid || r.d.regid || r.id;
      html += '<div class="result-list-item" onclick="loadCert(\''+escHtml(r.id)+'\',\''+r.table+'\')">'+
        '<span class="rli-type '+typeCls+'">'+typeLabel+'</span>'+
        '<span class="rli-corp">'+escHtml(r.d.corp||'—')+'</span>'+
        '<span class="rli-id">'+escHtml(displayId)+'</span>'+
        '<span class="rli-arrow">›</span>'+
      '</div>';
    });
    area.innerHTML = html;

  } catch(e) {
    area.innerHTML = '<div class="err-card"><div class="err-icon">🔴</div><div class="err-title">Database Error</div><div class="err-msg">'+escHtml(e.message)+'</div></div>';
  }
}

function renderResult(d, qrUrl, accentColor, table) {
  var area = document.getElementById('result-area');
  table = table || d._table || 'certificates';
  var isIPO = table === 'certificates';
  var isActive = (!d.status || d.status==='ACTIVE' || d.status==='REGISTERED');
  var statusClass = isActive ? 'status-active' : 'status-revoked';
  var statusLabel = d.status || (isIPO ? 'ACTIVE' : 'REGISTERED');
  var svgHtml = isIPO ? certSVG(d, qrUrl, accentColor) : regSVG(d);
  var displayId = d.certid || d.regid || '—';

  var dateFormatted = d.date ? new Date(d.date+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : (d.date||'—');

  // Record type badge
  var typePill = isIPO
    ? '<span style="font-size:9px;font-weight:700;letter-spacing:2px;background:rgba(122,0,0,.08);color:'+accentColor+';padding:4px 10px;border-radius:12px;margin-right:6px;">IPO CERTIFICATE</span>'
    : '<span style="font-size:9px;font-weight:700;letter-spacing:2px;background:rgba(44,62,80,.08);color:#2c3e50;padding:4px 10px;border-radius:12px;margin-right:6px;">REGISTRATION</span>';

  area.innerHTML =
    '<div class="result-header">'+
      typePill+
      '<div class="result-corp">'+(d.corp||'Unknown Corporation')+'</div>'+
      '<div class="result-id">'+escHtml(displayId)+'</div>'+
      '<span class="status-badge '+statusClass+'">'+escHtml(statusLabel)+'</span>'+
      '<div class="verify-stamp'+(isActive?'':' fail')+'">'+(isActive?'✓ VERIFIED':'✗ INVALID')+'</div>'+
    '</div>'+

    '<div class="cert-section-label"><span>📜</span> Official Certificate Document</div>'+
    '<div class="cert-wrap" id="cert-display">'+svgHtml+'</div>'+

    '<div class="dl-row">'+
      '<button class="dl-btn" onclick="dlSVG()">⬇ Download SVG</button>'+
      '<button class="dl-btn" onclick="dlPNG()">⬇ Download PNG</button>'+
      '<button class="dl-btn" onclick="dlJPG()">⬇ Download JPG</button>'+
    '</div>'+

    '<div class="cert-section-label"><span>📋</span> Record Details</div>'+
    '<div class="data-grid">'+
      dataCard('Corporation', d.corp, 'big')+
      dataCard('CEO / Leader', d.ceo, '')+
      dataCard(isIPO ? 'Certificate ID' : 'Registration ID', displayId, 'mono')+
      dataCard('Date '+(isIPO?'Issued':'Registered'), dateFormatted, '')+
      (isIPO ? dataCard('Authorized Shares', d.shares, '') : '')+
      (isIPO ? dataCard('Initial Share Price', d.price, '') : '')+
      (isIPO ? dataCard('Issued By', d.issuedBy, '') : dataCard('Registry Officer', d.officer, ''))+
      (isIPO ? dataCard('Issuer Title', d.issuerTitle, '') : '')+
      dataCard('Exchange / Registry', d.exchange || (isIPO ? 'GOV-MC Exchange' : 'GOV-MC Corporate Registry'), '')+
      dataCard('Status', statusLabel, '')+
      (d.issuedAt ? dataCard('Timestamp', new Date(d.issuedAt).toLocaleString(), '') : '')+
    '</div>'+

    '<div class="footer">GOV-MC EXCHANGE SYSTEM • CERTIFICATE VERIFICATION PORTAL • RTDB LIVE RECORD • TAMPER-EVIDENT</div>';

  // store for downloads
  window._certSVGCache = { d: d, qrUrl: qrUrl, accentColor: accentColor, table: table };
}

function dataCard(label, val, cls) {
  return '<div class="data-card"><div class="data-card-label">'+escHtml(label)+'</div>'+
    '<div class="data-card-value'+(cls?' '+cls:'')+'">'+escHtml(val||'—')+'</div></div>';
}

// ── DOWNLOADS ────────────────────────────────────────────
function dlSVG() {
  var c=window._certSVGCache; if(!c) return;
  var svg = (c.table==='certificates') ? certSVG(c.d,c.qrUrl,c.accentColor) : regSVG(c.d);
  var b=new Blob([svg],{type:'image/svg+xml'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  var fn = c.d.certid||c.d.regid||'certificate';

// ── ON LOAD: check URL params ─────────────────────────────
(function(){
  var params = new URLSearchParams(window.location.search);
  var id     = params.get('id');
  var regid  = params.get('regid');
  var corp   = params.get('corp');
  if (id) {
    document.getElementById('search-input').value = id;
    loadCert(id, 'certificates');
  } else if (regid) {
    document.getElementById('search-input').value = regid;
    loadCert(regid, 'registrations');
  } else if (corp) {
    document.getElementById('search-input').value = corp;
    searchByCorpName(corp);
  }
  updateSearchHint();
})();
