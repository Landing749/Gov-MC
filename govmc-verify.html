<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOV-MC — Verify Certificate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7a0000;
  --cream:#f8f4e6;--border:#e0d4c4;--bg:#eee9df;
  --text:#1a1208;--muted:#7a6f5e;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ─── NAV ─── */
.nav{
  background:var(--accent);color:#fff;height:56px;
  display:flex;align-items:center;padding:0 28px;gap:16px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.nav-logo{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;letter-spacing:6px}
.nav-sep{width:1px;height:28px;background:rgba(255,255,255,.2)}
.nav-sub{font-size:10px;letter-spacing:3px;opacity:.6;text-transform:uppercase;font-weight:500}
.nav-sp{flex:1}
.nav-pill{font-size:9px;font-weight:600;background:rgba(255,255,255,.12);padding:5px 13px;border-radius:20px;letter-spacing:2px;border:1px solid rgba(255,255,255,.18);text-transform:uppercase;}
.nav-link{font-size:10px;color:rgba(255,255,255,.7);text-decoration:none;letter-spacing:.8px;padding:5px 13px;border-radius:6px;transition:all .15s;font-weight:500;}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}

/* ─── PAGE ─── */
.page{max-width:1100px;margin:0 auto;padding:40px 24px 60px}

/* ─── SEARCH BAR ─── */
.search-wrap{
  background:#fff;border-radius:14px;
  border:1.5px solid var(--border);
  padding:24px 28px;margin-bottom:32px;
  box-shadow:0 2px 16px rgba(0,0,0,.06);
}
.search-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.search-title::after{content:'';flex:1;height:1px;background:var(--border)}
.search-row{display:flex;gap:10px}
.search-input{
  flex:1;padding:11px 16px;font-size:14px;font-family:'DM Sans',sans-serif;
  border:1.5px solid var(--border);border-radius:8px;outline:none;
  background:#fafaf8;transition:all .15s;
}
.search-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(122,0,0,.07);}
.search-btn{
  padding:11px 22px;background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;
  font-weight:600;cursor:pointer;letter-spacing:.4px;transition:all .15s;
}
.search-btn:hover{background:#5a0000;transform:translateY(-1px);box-shadow:0 4px 14px rgba(122,0,0,.3)}

/* ─── STATUS STATES ─── */
.state{text-align:center;padding:60px 20px;color:#bbb;font-size:14px;letter-spacing:.5px}
.state-icon{font-size:48px;margin-bottom:16px;display:block}

/* ─── RESULT HEADER ─── */
.result-header{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
  padding:16px 20px;background:#fff;border-radius:10px;
  border:1.5px solid var(--border);
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.status-badge{
  padding:6px 16px;border-radius:20px;font-size:10px;font-weight:800;
  letter-spacing:2.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;
}
.status-active{background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7}
.status-revoked{background:#ffebee;color:#b71c1c;border:1.5px solid #ef9a9a}
.status-unknown{background:#f3e5f5;color:#6a1b9a;border:1.5px solid #ce93d8}
.result-id{font-family:'DM Mono',monospace;font-size:14px;color:var(--muted);font-weight:500}
.result-corp{font-size:18px;font-family:'Playfair Display',serif;color:var(--text);font-weight:700;flex:1}
.verify-stamp{
  display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;
  letter-spacing:2px;color:#2e7d32;text-transform:uppercase;
  background:#e8f5e9;padding:7px 14px;border-radius:8px;border:1px solid #a5d6a7;
}
.verify-stamp.fail{color:#b71c1c;background:#ffebee;border-color:#ef9a9a}

/* ─── CERT DISPLAY ─── */
.cert-section-label{
  font-size:9px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.cert-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.cert-wrap{
  background:#fff;border-radius:10px;
  box-shadow:0 8px 48px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.05);
  overflow:hidden;margin-bottom:28px;
}
.cert-wrap svg{width:100%;height:auto;display:block}

/* ─── DATA TABLE ─── */
.data-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;margin-bottom:32px;
}
.data-card{
  background:#fff;border:1.5px solid var(--border);border-radius:10px;
  padding:14px 16px;
}
.data-card-label{font-size:9.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.data-card-value{font-size:14px;font-family:'DM Mono',monospace;color:var(--text);font-weight:500;word-break:break-all}
.data-card-value.big{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}

/* ─── ERROR CARD ─── */
.err-card{
  background:#fff;border:1.5px solid #ef9a9a;border-radius:12px;
  padding:32px;text-align:center;max-width:500px;margin:40px auto;
  box-shadow:0 4px 24px rgba(0,0,0,.06);
}
.err-icon{font-size:40px;margin-bottom:12px}
.err-title{font-size:18px;font-family:'Playfair Display',serif;color:#b71c1c;margin-bottom:8px}
.err-msg{font-size:13px;color:#999;line-height:1.7}

/* Loading spinner */
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(122,0,0,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Download row */
.dl-row{display:flex;gap:10px;justify-content:center;margin-bottom:32px}
.dl-btn{
  padding:10px 22px;background:transparent;color:var(--accent);
  border:1.5px solid var(--accent);border-radius:8px;
  font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;
  cursor:pointer;letter-spacing:.4px;transition:all .15s;
}
.dl-btn:hover{background:#fff5f5;transform:translateY(-1px)}

/* Footer strip */
.footer{
  text-align:center;font-size:10.5px;color:#bbb;letter-spacing:.8px;
  padding-top:24px;border-top:1px solid var(--border);
  font-family:'DM Mono',monospace;
}

#qr-gen{position:fixed;left:-9999px;top:-9999px;width:300px;height:300px}
</style>
</head>
<body>
<div id="qr-gen"></div>

<nav class="nav" id="main-nav">
  <span class="nav-logo">GOV-MC</span>
  <div class="nav-sep"></div>
  <span class="nav-sub">Certificate Verification</span>
  <div class="nav-sp"></div>
  <a class="nav-link" href="govmc-issue.html">⊕ Issue Certificate</a>
  <span class="nav-pill">Verify Portal</span>
</nav>

<div class="page">

  <!-- Search Bar -->
  <div class="search-wrap">
    <div class="search-title"><span>🔍</span> Certificate Lookup</div>
    <div class="search-row">
      <input class="search-input" id="search-input" type="text" placeholder="Enter Certificate ID — e.g. GMC-IPO-0001" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">Verify</button>
    </div>
  </div>

  <!-- Result area -->
  <div id="result-area">
    <div class="state">
      <span class="state-icon">🏛️</span>
      Enter a Certificate ID above to verify its authenticity and view the official document.
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
// ── FIREBASE ──────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyCxylDmL0gBJsPGeKG8rLbvDWphbaDAIvk",
  authDomain:"minecraft-server-ce7fb.firebaseapp.com",
  databaseURL:"https://minecraft-server-ce7fb-default-rtdb.firebaseio.com",
  projectId:"minecraft-server-ce7fb",
  storageBucket:"minecraft-server-ce7fb.firebasestorage.app",
  messagingSenderId:"887361447311",
  appId:"1:887361447311:web:7e6d46c1897f651b5a97fa"
});
const db = firebase.database();

// ── THEMES ────────────────────────────────────────────────
var THEMES = {
  red:   '#7a0000',
  green: '#1a6b28',
  gold:  '#8a6800',
};
function themeColor(t){ return THEMES[t] || THEMES['red']; }

// ── QR GEN ────────────────────────────────────────────────
function genQR(url) {
  return new Promise(function(resolve) {
    var div=document.getElementById('qr-gen'); div.innerHTML='';
    new QRCode(div,{text:url,width:300,height:300,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      var canvas=div.querySelector('canvas');
      if(canvas)return resolve(canvas.toDataURL('image/png'));
      var img2=div.querySelector('img');resolve(img2?img2.src:null);
    });});
  });
}

// ── URL PARAM ─────────────────────────────────────────────
function getParam(name) {
  var u=new URLSearchParams(window.location.search); return u.get(name)||'';
}

// ── SEARCH ────────────────────────────────────────────────
function doSearch() {
  var id = document.getElementById('search-input').value.trim();
  if(!id){alert('Please enter a Certificate ID.');return;}
  window.history.replaceState({},'','?id='+encodeURIComponent(id));
  loadCert(id);
}

async function loadCert(id) {
  var area = document.getElementById('result-area');
  var ac = themeColor('red');
  document.getElementById('main-nav').style.background = ac;
  area.innerHTML = '<div class="state"><div class="spinner"></div><br>Looking up <strong>'+escHtml(id)+'</strong> in the GOV-MC database…</div>';
  try {
    var snap = await db.ref('certificates/'+id).once('value');
    if(!snap.exists()) {
      area.innerHTML = '<div class="err-card"><div class="err-icon">⚠️</div><div class="err-title">Certificate Not Found</div><div class="err-msg">No record matching <strong>'+escHtml(id)+'</strong> exists in the GOV-MC database. This certificate may be invalid, counterfeit, or the ID was entered incorrectly.</div></div>';
      return;
    }
    var d = snap.val();
    var accentColor = themeColor(d.theme || 'red');
    document.getElementById('main-nav').style.background = accentColor;

    // Build verify URL for QR
    var verifyURL = window.location.href.replace(/\?.*$/,'')+'?id='+encodeURIComponent(d.certid||id);
    var qrUrl = await genQR(verifyURL);

    renderResult(d, qrUrl, accentColor);
  } catch(e) {
    area.innerHTML = '<div class="err-card"><div class="err-icon">🔴</div><div class="err-title">Database Error</div><div class="err-msg">'+escHtml(e.message)+'</div></div>';
  }
}

function renderResult(d, qrUrl, accentColor) {
  var area = document.getElementById('result-area');
  var isActive = (!d.status || d.status==='ACTIVE');
  var statusClass = isActive ? 'status-active' : 'status-revoked';
  var statusLabel = d.status || 'ACTIVE';
  var svgHtml = certSVG(d, qrUrl, accentColor);

  var dateFormatted = d.date ? new Date(d.date+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : (d.date||'—');

  area.innerHTML =
    '<div class="result-header">'+
      '<div class="result-corp">'+(d.corp||'Unknown Corporation')+'</div>'+
      '<div class="result-id">'+(d.certid||id)+'</div>'+
      '<span class="status-badge '+statusClass+'">'+statusLabel+'</span>'+
      '<div class="verify-stamp'+(isActive?'':' fail')+'">'+(isActive?'✓ VERIFIED':'✗ INVALID')+'</div>'+
    '</div>'+

    '<div class="cert-section-label"><span>📜</span> Official Certificate Document</div>'+
    '<div class="cert-wrap" id="cert-display">'+svgHtml+'</div>'+

    '<div class="dl-row">'+
      '<button class="dl-btn" onclick="dlSVG()">⬇ Download SVG</button>'+
      '<button class="dl-btn" onclick="dlPNG()">⬇ Download PNG</button>'+
      '<button class="dl-btn" onclick="dlJPG()">⬇ Download JPG</button>'+
    '</div>'+

    '<div class="cert-section-label"><span>📋</span> Record Details</div>'+
    '<div class="data-grid">'+
      dataCard('Corporation',d.corp,'big')+
      dataCard('CEO / Leader',d.ceo,'')+
      dataCard('Certificate ID',d.certid,'mono')+
      dataCard('Date Issued',dateFormatted,'')+
      dataCard('Authorized Shares',d.shares,'')+
      dataCard('Initial Share Price',d.price,'')+
      dataCard('Issued By',d.issuedBy,'')+
      dataCard('Issuer Title',d.issuerTitle,'')+
      dataCard('Exchange',d.exchange||'GOV-MC Exchange','')+
      dataCard('Status',statusLabel,'')+
      dataCard('Theme',d.theme||'red','')+
      (d.issuedAt ? dataCard('Timestamp',new Date(d.issuedAt).toLocaleString(),'') : '')+
    '</div>'+

    '<div class="footer">GOV-MC EXCHANGE SYSTEM • CERTIFICATE VERIFICATION PORTAL • RTDB LIVE RECORD • TAMPER-EVIDENT</div>';

  // store for downloads
  window._certSVGCache = { d: d, qrUrl: qrUrl, accentColor: accentColor };
}

function dataCard(label, val, cls) {
  return '<div class="data-card"><div class="data-card-label">'+escHtml(label)+'</div>'+
    '<div class="data-card-value'+(cls?' '+cls:'')+'">'+escHtml(val||'—')+'</div></div>';
}

// ── DOWNLOADS ────────────────────────────────────────────
function dlSVG() {
  var c=window._certSVGCache; if(!c) return;
  var svg=certSVG(c.d,c.qrUrl,c.accentColor);
  var b=new Blob([svg],{type:'image/svg+xml'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=(c.d.certid||'certificate')+'.svg';a.click();URL.revokeObjectURL(u);
}
function dlRaster(fmt) {
  var c=window._certSVGCache; if(!c) return;
  var svgStr=certSVG(c.d,c.qrUrl,c.accentColor);
  var blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
  var url=URL.createObjectURL(blob), img=new Image();
  img.onload=function(){
    var sc=3, cv=document.createElement('canvas');
    cv.width=1400*sc; cv.height=900*sc;
    var ctx=cv.getContext('2d');
    if(fmt==='jpg'){ctx.fillStyle='#f8f4e6';ctx.fillRect(0,0,cv.width,cv.height);}
    ctx.scale(sc,sc); ctx.drawImage(img,0,0,1400,900);
    URL.revokeObjectURL(url);
    var mime=fmt==='jpg'?'image/jpeg':'image/png';
    cv.toBlob(function(b2){
      var u2=URL.createObjectURL(b2),a=document.createElement('a');
      a.href=u2;a.download=(c.d.certid||'certificate')+'.'+fmt;a.click();URL.revokeObjectURL(u2);
    },mime,fmt==='jpg'?0.96:undefined);
  };img.src=url;
}
function dlPNG(){dlRaster('png');}function dlJPG(){dlRaster('jpg');}

// ── HTML ESCAPE ────────────────────────────────────────────
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function x(s){return escHtml(s);}

// ── STAMP ─────────────────────────────────────────────────
function makeStamp(ac, label) {
  if (!label) return '';
  var len=label.length, fs=len<=4?62:len<=6?52:len<=8?44:36;
  return '<g transform="translate(340,690) rotate(-28)" opacity="0.88">'+
    '<circle cx="0" cy="0" r="92" fill="none" stroke="'+ac+'" stroke-width="5"/>'+
    '<circle cx="0" cy="0" r="82" fill="none" stroke="'+ac+'" stroke-width="1.5"/>'+
    '<circle cx="0" cy="0" r="86" fill="'+ac+'" fill-opacity="0.06"/>'+
    '<text x="0" y="8" text-anchor="middle" dominant-baseline="middle" font-size="'+fs+'" font-family="DM Sans,sans-serif" font-weight="900" fill="'+ac+'" letter-spacing="4" opacity="0.92">'+x(label)+'</text>'+
    '<line x1="-70" y1="-22" x2="70" y2="-22" stroke="'+ac+'" stroke-width="2" opacity="0.6"/>'+
    '<line x1="-70" y1="36" x2="70" y2="36" stroke="'+ac+'" stroke-width="2" opacity="0.6"/>'+
    '<text x="0" y="-36" text-anchor="middle" font-size="9" font-family="monospace" fill="'+ac+'" letter-spacing="3.5" opacity="0.7">GOV-MC EXCHANGE</text>'+
    '<text x="0" y="52" text-anchor="middle" font-size="8" font-family="monospace" fill="'+ac+'" letter-spacing="2.5" opacity="0.7">OFFICIAL STAMP</text>'+
  '</g>';
}

// ── SVG CERT ─────────────────────────────────────────────
function certSVG(d, qrUrl, ac) {

  var corp        = x(d.corp        || '[CORPORATION NAME]');
  var ceo         = x(d.ceo         || '[CEO NAME]');
  var shares      = x(d.shares      || '[SHARES]');
  var price       = x(d.price       || '[PRICE]');
  var certid      = x(d.certid      || '[GMC-IPO-XXXX]');
  var date        = x(d.date        || '[DATE]');
  var issuedBy    = x(d.issuedBy    || 'GOV-MC Exchange Authority');
  var issuerTitle = x(d.issuerTitle || 'Authorized Signatory');
  var qrEl = qrUrl
    ? '<image href="'+qrUrl+'" x="997" y="466" width="135" height="135"/>'
    : '<text x="1064" y="530" text-anchor="middle" font-size="9" font-family="monospace" fill="#c0b8a8">QR CODE</text>';
  var stampEl = (d.stamp && d.stamp.trim()) ? makeStamp(ac, d.stamp.trim().toUpperCase()) : '';

  return '<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">'+
'<defs>'+
'<pattern id="cg2" width="56" height="56" patternUnits="userSpaceOnUse">'+

'<path id="tbp2" d="M 82 47 H 1318"/>'+

'<path id="srp2" d="M1130,308 m-84,0 a84,84 0 1,1 168,0 a84,84 0 1,1-168,0"/>'+
'<path id="stp2" d="M1067,308 A63,63 0 0,1 1193,308"/>'+
'<path id="sbp2" d="M1067,308 A63,63 0 0,0 1193,308"/>'+
'</defs>'+
'<rect width="1400" height="900" fill="#f8f4e6"/>'+
'<rect width="1400" height="900" fill="url(#cg2)" opacity="0.13"/>'+
'<text x="700" y="520" text-anchor="middle" font-size="195" font-family="serif" fill="'+ac+'" opacity="0.022" transform="rotate(-11,700,520)">GOV-MC</text>'+
'<rect x="13" y="13" width="1374" height="874" fill="none" stroke="#1a1a1a" stroke-width="3.5" rx="2"/>'+
'<rect x="26" y="26" width="1348" height="848" fill="none" stroke="'+ac+'" stroke-width="1.5"/>'+
'<rect x="31" y="31" width="1338" height="838" fill="none" stroke="'+ac+'" stroke-width="0.5"/>'+
'<text font-size="6.5" fill="'+ac+'" letter-spacing="2.8" font-family="monospace" opacity="0.55"><textPath href="#tbp2">GOV-MC • VERIFIED • DO NOT DUPLICATE • TRACEABLE • AUTHORIZED IPO • GOV-MC • VERIFIED • DO NOT DUPLICATE • TRACEABLE •</textPath></text>'+
'<text font-size="6.5" fill="'+ac+'" letter-spacing="2.8" font-family="monospace" opacity="0.55"><textPath href="#bbp2">AUTHORIZED IPO • GOV-MC EXCHANGE • OFFICIAL RECORD • VERIFIED INSTRUMENT • AUTHORIZED IPO • GOV-MC EXCHANGE •</textPath></text>'+
'<text font-size="6.5" fill="'+ac+'" letter-spacing="2" font-family="monospace" opacity="0.55"><textPath href="#lbp2">GOV-MC SECURITY • VERIFIED • GOV-MC SECURITY • VERIFIED • GOV-MC SECURITY •</textPath></text>'+
'<text font-size="6.5" fill="'+ac+'" letter-spacing="2" font-family="monospace" opacity="0.55"><textPath href="#rbp2">AUTHENTIC CERTIFICATE • DO NOT FORGE • AUTHENTIC CERTIFICATE • DO NOT FORGE •</textPath></text>'+
'<text x="52" y="74" font-size="17" fill="'+ac+'" font-family="serif" opacity="0.65">✦</text>'+
'<text x="1348" y="74" font-size="17" fill="'+ac+'" font-family="serif" text-anchor="end" opacity="0.65">✦</text>'+
'<text x="52" y="855" font-size="17" fill="'+ac+'" font-family="serif" opacity="0.65">✦</text>'+
'<text x="1348" y="855" font-size="17" fill="'+ac+'" font-family="serif" text-anchor="end" opacity="0.65">✦</text>'+
'<text x="700" y="86" text-anchor="middle" font-size="35" font-family="serif" fill="#1a1a1a" letter-spacing="4">OFFICIAL STOCK CERTIFICATE</text>'+
'<text x="700" y="111" text-anchor="middle" font-size="11.5" font-family="sans-serif" fill="'+ac+'" letter-spacing="3.5">GOVERNMENT VERIFIED MARKET INSTRUMENT</text>'+
