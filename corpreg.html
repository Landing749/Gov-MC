<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#2c3e50;--accent2:#1a2838;--accent-light:rgba(44,62,80,.07);
  --cream:#f8f4e6;--border:#e0d4c4;--bg:#eee9df;
  --sidebar:#fff;--card:#fafaf8;
  --text:#1a1208;--muted:#7a6f5e;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
.nav{background:var(--accent);color:#fff;height:56px;display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.nav-logo{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;letter-spacing:6px}
.nav-sep{width:1px;height:28px;background:rgba(255,255,255,.2)}
.nav-sub{font-size:10px;letter-spacing:3px;opacity:.6;text-transform:uppercase;font-weight:500}
.nav-sp{flex:1}
.nav-pill{font-size:9px;font-weight:600;background:rgba(255,255,255,.12);padding:5px 13px;border-radius:20px;letter-spacing:2px;border:1px solid rgba(255,255,255,.18);text-transform:uppercase;}
.nav-link{font-size:10px;color:rgba(255,255,255,.7);text-decoration:none;letter-spacing:.8px;padding:5px 13px;border-radius:6px;transition:all .15s;font-weight:500;}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 56px)}

/* SIDEBAR */
.fp{width:320px;min-width:320px;background:var(--sidebar);border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.fp::-webkit-scrollbar{width:4px}
.fp::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.fp-inner{padding:24px 20px;flex:1}
.slabel{font-size:9px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--accent);margin:24px 0 14px;display:flex;align-items:center;gap:10px;}
.slabel:first-child{margin-top:0}
.slabel-icon{font-size:13px}
.slabel::after{content:'';flex:1;height:1px;background:var(--border)}
.field{margin-bottom:13px}
.field label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.4px;}
.field input,.field select{width:100%;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);border-radius:8px;background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s;color:var(--text);}
.field input:focus,.field select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-light);}
.field input[type="date"]{color:var(--muted)}
.certid-row{display:flex;gap:8px;align-items:flex-end}
.certid-row .field{flex:1;margin-bottom:0}
.btn-gen{padding:9px 11px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);border-radius:8px;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.5px;transition:all .15s;height:38px;}
.btn-gen:hover{background:#f0f4f8}

/* STATUS BADGE */
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.status-btn{padding:5px 11px;border-radius:6px;border:1.5px solid var(--border);background:transparent;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:1px;color:var(--muted);transition:all .15s;}
.status-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.status-btn:hover:not(.active){background:#f5f0ea}

/* E-SIG */
.sig-upload-row{display:flex;gap:8px;margin-bottom:12px;}
.sig-upload-btn{flex:1;padding:9px 8px;border:1.5px dashed var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:10.5px;font-weight:600;color:var(--muted);text-align:center;transition:all .15s;font-family:'DM Sans',sans-serif;}
.sig-upload-btn:hover{border-color:var(--accent);color:var(--accent);background:#f0f4f8;}
.sig-upload-btn.has-sig{border-color:var(--accent);background:#f0f4f8;color:var(--accent);}
.sig-hint{font-size:10px;color:#bbb;line-height:1.5;margin-bottom:8px;}

/* ACTIONS */
.fp-actions{padding:16px 20px;border-top:1.5px solid var(--border);display:flex;flex-direction:column;gap:8px;background:var(--card);}
.btn{padding:11px 14px;border:none;border-radius:8px;font-size:12.5px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;letter-spacing:.4px;transition:all .15s;text-align:center;}
.btn-pri{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.btn-pri:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-out{background:transparent;color:var(--accent);border:1.5px solid var(--accent);}
.btn-out:hover{background:rgba(0,0,0,.03)}
.dl-row{display:flex;gap:6px}
.dl-row .btn-out{flex:1;font-size:11.5px;padding:9px 8px}

/* PREVIEW */
.prev{flex:1;overflow:auto;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;background:var(--bg);}
.prev-topbar{display:flex;align-items:center;gap:12px;width:100%;max-width:1000px}
.prev-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#999;font-weight:700}
.prev-badge{font-size:9px;background:rgba(44,62,80,.1);color:var(--accent);padding:3px 11px;border-radius:12px;letter-spacing:1.5px;font-weight:700;}
.cert-wrap{background:#fff;border-radius:8px;box-shadow:0 8px 48px rgba(0,0,0,.16),0 2px 8px rgba(0,0,0,.06);width:100%;max-width:1000px;overflow:hidden;position:relative;}
.cert-wrap svg{width:100%;height:auto;display:block}
.prev-hint{font-size:11px;color:#bbb;letter-spacing:.5px;margin-top:2px}

/* SIG OVERLAY */
#sig-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
.sig-item{position:absolute;pointer-events:all;cursor:grab;user-select:none;-webkit-user-select:none;transform-origin:top left;}
.sig-item:active{cursor:grabbing;}
.sig-item img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none;}
.sig-item .sig-toolbar{position:absolute;top:-22px;left:0;display:flex;gap:3px;opacity:0;transition:opacity .15s;pointer-events:all;}
.sig-item:hover .sig-toolbar{opacity:1;}
.sig-tbtn{background:rgba(30,30,30,.82);color:#fff;border:none;font-size:9px;padding:3px 7px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sig-tbtn:hover{background:#000;}
.sig-resize{position:absolute;bottom:-6px;right:-6px;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:se-resize;pointer-events:all;}
</style>

function setStatus(s) {
  currentStatus = s;
  document.querySelectorAll('.status-btn').forEach(function(b){ b.classList.toggle('active', b.textContent===s); });
  updatePreview();
}

async function autoGenRegId() {
  var hint = document.getElementById('regid-hint');
  hint.textContent = 'Checking records…'; hint.style.color = '#e65100';
  try {
    var snap = await db.ref('registrations').once('value');
    var keys = snap.exists() ? Object.keys(snap.val()) : [];
    var used = new Set();
    keys.forEach(function(k){ var m=k.match(/^GMC-REG-(\d+)$/i); if(m)used.add(parseInt(m[1],10)); });
    var next=1; while(used.has(next))next++;
    var newId = 'GMC-REG-'+String(next).padStart(4,'0');
    document.getElementById('f-regid').value = newId; updatePreview();
    hint.textContent = '✓ Generated ('+keys.length+' existing)'; hint.style.color='#388e3c';
  } catch(e){ hint.textContent='⚠ DB error: '+e.message; hint.style.color='#c62828'; }
}

function x(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getData() {
  return {
    corp: document.getElementById('f-corp').value.trim(),
    ceo:  document.getElementById('f-ceo').value.trim(),
    regid: document.getElementById('f-regid').value.trim(),
    date: document.getElementById('f-date').value.trim(),
    officer: document.getElementById('f-officer').value.trim(),
    status: currentStatus,
  };
}

// ── E-SIGNATURE ──────────────────────────────────────────
var sigImages = { sig1: null };
var SIG_DEFAULTS = { sig1: { svgX: 90, svgY: 730, svgW: 260, svgH: 80 } };
var _dragState = null, _resizeState = null;

function handleSigUpload(key, input) {
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var d = SIG_DEFAULTS[key];
    sigImages[key] = { dataUrl:e.target.result, svgX:d.svgX, svgY:d.svgY, svgW:d.svgW, svgH:d.svgH };
    var btn = document.getElementById(key+'-btn');
    btn.classList.add('has-sig'); btn.querySelector('span').textContent = '✓ Uploaded';
    document.getElementById('sig-clear-row').style.display = 'block';
    renderSigOverlays();
  };
  reader.readAsDataURL(file); input.value='';
}

function clearAllSigs() {
  sigImages.sig1 = null;
  var btn = document.getElementById('sig1-btn');
  btn.classList.remove('has-sig'); btn.querySelector('span').textContent = 'Registry Officer';
  document.getElementById('sig-clear-row').style.display = 'none';
  renderSigOverlays();
}

function screenToSVGCoords(sx, sy) {
  var svgEl = document.querySelector('#cert-container svg');
  if(!svgEl) return {x:0,y:0};
  var rect = svgEl.getBoundingClientRect();
  return { x:(sx-rect.left)/rect.width*1400, y:(sy-rect.top)/rect.height*900 };
}

function renderSigOverlays() {
  var overlay = document.getElementById('sig-overlay');
  overlay.innerHTML = '';
  ['sig1'].forEach(function(key) {
    var sig = sigImages[key]; if(!sig) return;
    var el = document.createElement('div');
    el.className = 'sig-item'; el.dataset.key = key;
    el.style.left  = (sig.svgX/1400*100)+'%';
    el.style.top   = (sig.svgY/900*100)+'%';
    el.style.width  = (sig.svgW/1400*100)+'%';
    el.style.height = (sig.svgH/900*100)+'%';
    el.innerHTML =
      '<div class="sig-toolbar">'+
        '<button class="sig-tbtn" onclick="clearAllSigs()">✕ Remove</button>'+
        '<button class="sig-tbtn" onclick="resetSigPos(\''+key+'\')">⟲ Reset</button>'+
      '</div>'+
      '<img src="'+sig.dataUrl+'" draggable="false"/>'+
      '<div class="sig-resize" data-key="'+key+'"></div>';
    el.addEventListener('mousedown', function(e) {
      if(e.target.classList.contains('sig-resize')||e.target.classList.contains('sig-tbtn')) return;
      e.preventDefault();
      var sc = screenToSVGCoords(e.clientX,e.clientY);
      _dragState = {key:key,startX:sc.x,startY:sc.y,origX:sig.svgX,origY:sig.svgY};
    });
    el.querySelector('.sig-resize').addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      var sc = screenToSVGCoords(e.clientX,e.clientY);
      _resizeState = {key:key,startX:sc.x,startY:sc.y,origW:sig.svgW,origH:sig.svgH};
    });
    overlay.appendChild(el);
  });
}

document.addEventListener('mousemove', function(e) {
  if(_dragState) {
    var cur=screenToSVGCoords(e.clientX,e.clientY), k=_dragState.key, sig=sigImages[k]; if(!sig)return;
    sig.svgX=_dragState.origX+(cur.x-_dragState.startX);
    sig.svgY=_dragState.origY+(cur.y-_dragState.startY);
    var el=document.querySelector('.sig-item[data-key="'+k+'"]');
    if(el){el.style.left=(sig.svgX/1400*100)+'%';el.style.top=(sig.svgY/900*100)+'%';}
  }
  if(_resizeState) {
    var cur2=screenToSVGCoords(e.clientX,e.clientY), k2=_resizeState.key, sig2=sigImages[k2]; if(!sig2)return;
    sig2.svgW=Math.max(40,_resizeState.origW+(cur2.x-_resizeState.startX));
    sig2.svgH=Math.max(20,_resizeState.origH+(cur2.y-_resizeState.startY));
    var el2=document.querySelector('.sig-item[data-key="'+k2+'"]');
    if(el2){el2.style.width=(sig2.svgW/1400*100)+'%';el2.style.height=(sig2.svgH/900*100)+'%';}
  }
});
document.addEventListener('mouseup',function(){_dragState=null;_resizeState=null;});

function resetSigPos(key) {
  var d=SIG_DEFAULTS[key]; if(sigImages[key]){Object.assign(sigImages[key],d);}
  renderSigOverlays();
}

function injectSigsIntoSVG(svgStr) {
  var sigEls = '';
  ['sig1'].forEach(function(key) {
    var sig=sigImages[key]; if(!sig) return;
    sigEls += '<image href="'+sig.dataUrl+'" x="'+Math.round(sig.svgX)+'" y="'+Math.round(sig.svgY)+'" width="'+Math.round(sig.svgW)+'" height="'+Math.round(sig.svgH)+'" preserveAspectRatio="xMidYMid meet"/>';
  });
  return sigEls ? svgStr.replace('</svg>', sigEls+'</svg>') : svgStr;
}

function updatePreview() {
  document.getElementById('cert-container').innerHTML = certSVG(getData());
  renderSigOverlays();
}

function downloadSVG() {
  var d=getData(), svg=injectSigsIntoSVG(certSVG(d));
  var b=new Blob([svg],{type:'image/svg+xml'}), u=URL.createObjectURL(b), a=document.createElement('a');
  a.href=u; a.download=(d.regid||'registration')+'.svg'; a.click(); URL.revokeObjectURL(u);
}
function downloadRaster(format) {
  var d=getData(), svgStr=injectSigsIntoSVG(certSVG(d));
  var blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'}), url=URL.createObjectURL(blob);
  var img=new Image();
  img.onload=function(){
    var sc=3, canvas=document.createElement('canvas');
    canvas.width=1400*sc; canvas.height=900*sc;
    var ctx=canvas.getContext('2d');
    if(format==='jpg'){ctx.fillStyle='#fdfbf5';ctx.fillRect(0,0,canvas.width,canvas.height);}
    ctx.scale(sc,sc); ctx.drawImage(img,0,0,1400,900); URL.revokeObjectURL(url);
    var mime=format==='jpg'?'image/jpeg':'image/png', q=format==='jpg'?0.96:undefined;
    canvas.toBlob(function(b2){var u2=URL.createObjectURL(b2),a=document.createElement('a');a.href=u2;a.download=(d.regid||'registration')+'.'+format;a.click();URL.revokeObjectURL(u2);},mime,q);
  };
  img.src=url;
}

// Init
updatePreview();
</script>
